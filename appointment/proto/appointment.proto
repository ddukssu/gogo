syntax = "proto3";
package appointment;
option go_package = "github.com/ddukssu/gogo/appointment/proto";

service AppointmentService {
  rpc CreateAppointment(CreateAppointmentRequest) returns (AppointmentResponse);
}

message CreateAppointmentRequest {
  string patient_id = 1;
  string doctor_id = 2;
  string date = 3;
}

message AppointmentResponse {
  string id = 1;
  string patient_id = 2;
  string doctor_id = 3;
  string date = 4;
}